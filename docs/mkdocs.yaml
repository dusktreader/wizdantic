site_name: wizdantic documentation
site_url: http://dusktreader.github.io/wizdantic
repo_url: https://github.com/dusktreader/wizdantic
docs_dir: source
theme:
  name: material
  logo: images/wizdantic-logo.png
  favicon: images/wizdantic-logo.png
  features:
    - navigation.expand
    - navigation.footer
    - navigation.tracking
    - content.code.copy
  font:
    code: Fira Code
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
extra_css:
  - assets/stylesheets/extra.css
watch:
  - ../src/wizdantic
nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Features: features.md
  - Demo: demo.md
  - Reference: reference.md
plugins:
  search:
    lang: en
  superfences-ps1:
      prompt_color: "#89b0c2"
  mkdocstrings:
    default_handler: python
    handlers:
      python:
        paths: [..]
        options:
          heading_level: 3
          show_root_heading: true
          separate_signature: true
          show_signature_annotations: true
          show_source: false
          docstring_style: google
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite:
  - pymdownx.snippets:
  - pymdownx.superfences:
  - pymdownx.details:
  - admonition:
  - attr_list:
